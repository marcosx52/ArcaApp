name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - dev

jobs:
  validate:
    name: Validate / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check forbidden tracked secrets
        run: |
          forbidden=$(git ls-files | grep -E '(^|/)(\.env|\.env\..+)$' | grep -vE '(^|/)(\.env\.example)$' || true)
          if [ -n "$forbidden" ]; then
            echo "Tracked secret-like files detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Prisma validate
        working-directory: apps/api
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/facturacion_arca?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/facturacion_arca?schema=public"
        run: pnpm prisma validate

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
        run: pnpm --filter web build
